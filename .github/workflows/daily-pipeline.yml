name: Daily outreach pipeline

on:
  schedule:
    - cron: "0 13 * * 1-5" # 9am ET weekdays
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: outreach-pipeline
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      - name: Run daily pipeline with Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Read CLAUDE.md, then execute pipeline/daily-run.md end to end.
            Commit data/ changes as instructed. Use `gh` (GH_TOKEN is set) for any
            issues or PRs the instructions call for.
          claude_args: |
            --model claude-sonnet-5
            --max-turns 80
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,WebFetch,WebSearch"
        env:
          APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
          GH_TOKEN: ${{ github.token }}

      - name: Push any uncommitted data changes
        run: |
          git config user.name "outreach-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "daily run $(date -u +%F) (workflow sweep)"
          git push
