name: Inbox health check

on:
  schedule:
    - cron: "0 12 * * *" # daily 8am ET, before the pipeline runs
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Check TrulyInbox mailbox health
        run: python scripts/trulyinbox_monitor.py
        env:
          TRULYINBOX_API_KEY: ${{ secrets.TRULYINBOX_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      - name: Commit any notification log
        run: |
          git config user.name "outreach-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/notifications/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "inbox health alert $(date -u +%F)"
          git push || true
