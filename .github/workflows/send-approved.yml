name: Process approved booking replies

# Merging a booking-reply approval PR is the approval. This picks it up.
on:
  push:
    branches: [main]
    paths:
      - "data/queue/pending-approval/**"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Process approved replies
        run: python scripts/send_approved.py
        env:
          APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
      - name: Commit queue state
        run: |
          git config user.name "outreach-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/queue/
          git diff --cached --quiet || git commit -m "process approved booking replies"
          git push
